<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Stats Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f9fafb;
            min-height: 100vh;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #111827;
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        :root {
            --primary: 221.2 83.2% 53.3%;
            --accent: 142.1 76.2% 36.3%;
            --card: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --muted-foreground: 215.4 16.3% 46.9%;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --card: 222.2 84% 4.9%;
                --foreground: 210 40% 98%;
                --muted-foreground: 215 20.2% 65.1%;
            }
        }

        .section {
            padding: 3rem 0;
            position: relative;
            overflow: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .card-wrapper {
            position: relative;
        }

        .gradient-bg {
            position: absolute;
            inset: -0.25rem;
            background: linear-gradient(90deg, hsl(var(--primary)), hsl(var(--accent)), hsl(var(--primary)));
            opacity: 0.3;
            filter: blur(2rem);
            border-radius: 1rem;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            transition: opacity 1s;
        }

        .card-wrapper:hover .gradient-bg {
            opacity: 0.5;
            transition: opacity 0.5s;
        }

        .stats-card {
            position: relative;
            background-color: hsl(var(--card) / 0.8);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            border: 1px solid hsl(var(--primary) / 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem;
            transition: all 0.5s;
        }

        .card-wrapper:hover .stats-card {
            transform: scale(1.02) translateY(-0.25rem);
            box-shadow: 0 25px 50px -12px hsl(var(--primary) / 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.75rem;
            transition: transform 0.3s;
        }

        .stat-item:hover {
            transform: scale(1.1);
        }

        .icon-wrapper {
            position: relative;
            padding: 1rem;
            border-radius: 9999px;
            background: linear-gradient(135deg, hsl(var(--primary) / 0.1), hsl(var(--accent) / 0.1));
            transition: all 0.3s;
        }

        .stat-item:hover .icon-wrapper {
            background: linear-gradient(135deg, hsl(var(--primary) / 0.2), hsl(var(--accent) / 0.2));
        }

        .stat-item:hover .icon-wrapper svg {
            transform: rotate(12deg) scale(1.1);
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            transition: transform 0.3s;
        }

        .icon-glow {
            position: absolute;
            inset: 0;
            background: hsl(var(--primary) / 0.2);
            border-radius: 9999px;
            filter: blur(1rem);
            transition: all 0.3s;
        }

        .stat-item:hover .icon-glow {
            background: hsl(var(--primary) / 0.4);
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--accent)), hsl(var(--primary)));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        @media (min-width: 768px) {
            .stat-value {
                font-size: 3.75rem;
            }
        }

        .stat-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: hsl(var(--muted-foreground));
            transition: color 0.3s;
        }

        @media (min-width: 768px) {
            .stat-label {
                font-size: 1rem;
            }
        }

        .stat-item:hover .stat-label {
            color: hsl(var(--foreground));
        }

        .text-primary {
            color: hsl(var(--primary));
        }

        .text-accent {
            color: hsl(var(--accent));
        }
    </style>
</head>
<body>
    <section id="stats-section" class="section">
        <div class="container">
            <div class="card-wrapper">
                <!-- Animated background blur effect -->
                <div class="gradient-bg"></div>
                
                <!-- Main stats card -->
                <div class="stats-card">
                    <div class="stats-grid" id="stats-container">
                        <!-- Stats will be inserted here by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Stats data
        const stats = [
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>`,
                label: "Years of Experience",
                value: 13,
                suffix: "+",
                color: "text-primary"
            },
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
                label: "Countries Supported",
                value: 30,
                suffix: "+",
                color: "text-accent"
            },
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>`,
                label: "Projects Completed",
                value: 20,
                suffix: "+",
                color: "text-primary"
            },
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>`,
                label: "Publications",
                value: 10,
                suffix: "+",
                color: "text-accent"
            },
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>`,
                label: "Articles Reviewed",
                value: 30,
                suffix: "+",
                color: "text-primary"
            }
        ];

        // State
        let isVisible = false;
        let counts = stats.map(() => 0);

        // Render stats
        function renderStats() {
            const container = document.getElementById('stats-container');
            container.innerHTML = stats.map((stat, index) => `
                <div class="stat-item" style="animation-delay: ${index * 0.2}s">
                    <div style="position: relative;">
                        <div class="icon-glow"></div>
                        <div class="icon-wrapper ${stat.color}">
                            ${stat.icon}
                        </div>
                    </div>
                    
                    <div>
                        <p class="stat-value">
                            <span class="count-value" data-index="${index}">0</span>${stat.suffix}
                        </p>
                        <p class="stat-label">
                            ${stat.label}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        // Update counter display
        function updateDisplay() {
            counts.forEach((count, index) => {
                const element = document.querySelector(`[data-index="${index}"]`);
                if (element) {
                    element.textContent = count;
                }
            });
        }

        // Animate counters
        function animateCounters() {
            if (!isVisible) return;

            const duration = 2000;
            const steps = 60;
            const stepDuration = duration / steps;

            stats.forEach((stat, index) => {
                let currentStep = 0;
                const increment = stat.value / steps;

                const timer = setInterval(() => {
                    currentStep++;
                    counts[index] = Math.min(Math.ceil(increment * currentStep), stat.value);
                    updateDisplay();

                    if (currentStep >= steps) {
                        clearInterval(timer);
                    }
                }, stepDuration);
            });
        }

        // Intersection Observer
        const observer = new IntersectionObserver(
            ([entry]) => {
                if (entry.isIntersecting && !isVisible) {
                    isVisible = true;
                    animateCounters();
                }
            },
            { threshold: 0.1 }
        );

        // Initialize
        renderStats();
        const section = document.getElementById('stats-section');
        observer.observe(section);
    </script>
</body>
</html>
