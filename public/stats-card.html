<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Stats Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        :root {
            --primary: 221.2 83.2% 53.3%;
            --accent: 142.1 76.2% 36.3%;
            --card: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --border: 214.3 31.8% 91.4%;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --card: 222.2 84% 4.9%;
                --foreground: 210 40% 98%;
                --muted-foreground: 215 20.2% 65.1%;
                --border: 217.2 32.6% 17.5%;
            }
        }

        .bg-primary { background-color: hsl(var(--primary)); }
        .bg-accent { background-color: hsl(var(--accent)); }
        .text-primary { color: hsl(var(--primary)); }
        .text-accent { color: hsl(var(--accent)); }
        .text-foreground { color: hsl(var(--foreground)); }
        .text-muted-foreground { color: hsl(var(--muted-foreground)); }
        .bg-card { background-color: hsl(var(--card)); }
        .border-primary { border-color: hsl(var(--primary) / 0.2); }
        
        .gradient-text {
            background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--accent)), hsl(var(--primary)));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-bg {
            background: linear-gradient(90deg, hsl(var(--primary)), hsl(var(--accent)), hsl(var(--primary)));
        }

        .icon-glow {
            position: relative;
        }

        .icon-glow::before {
            content: '';
            position: absolute;
            inset: 0;
            background: hsl(var(--primary) / 0.2);
            border-radius: 9999px;
            filter: blur(1rem);
            transition: all 0.3s;
        }

        .group:hover .icon-glow::before {
            background: hsl(var(--primary) / 0.4);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <section id="stats-section" class="py-12 relative overflow-hidden">
        <div class="container mx-auto px-6">
            <div class="relative group">
                <!-- Animated background blur effect -->
                <div class="absolute -inset-1 gradient-bg opacity-30 blur-xl group-hover:opacity-50 transition duration-1000 group-hover:duration-500 animate-pulse rounded-2xl"></div>
                
                <!-- Main stats card -->
                <div class="relative bg-card backdrop-blur-xl rounded-2xl border border-primary shadow-2xl p-8 hover:shadow-xl transition-all duration-500 hover:scale-[1.02] hover:-translate-y-1" style="background-color: hsl(var(--card) / 0.8);">
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-8" id="stats-container">
                        <!-- Stats will be inserted here by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Stats data
        const stats = [
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>`,
                label: "Years of Experience",
                value: 13,
                suffix: "+",
                color: "text-primary"
            },
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
                label: "Countries Supported",
                value: 30,
                suffix: "+",
                color: "text-accent"
            },
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>`,
                label: "Projects Completed",
                value: 20,
                suffix: "+",
                color: "text-primary"
            },
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>`,
                label: "Publications",
                value: 10,
                suffix: "+",
                color: "text-accent"
            },
            {
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>`,
                label: "Articles Reviewed",
                value: 30,
                suffix: "+",
                color: "text-primary"
            }
        ];

        // State
        let isVisible = false;
        let counts = stats.map(() => 0);

        // Render stats
        function renderStats() {
            const container = document.getElementById('stats-container');
            container.innerHTML = stats.map((stat, index) => `
                <div class="stat-item flex flex-col items-center text-center space-y-3 group hover:scale-110 transition-all duration-300"
                     style="animation-delay: ${index * 0.2}s">
                    <div class="relative">
                        <div class="icon-glow"></div>
                        <div class="relative p-4 rounded-full bg-gradient-to-br transition-all duration-300 ${stat.color}" 
                             style="background: linear-gradient(135deg, hsl(var(--primary) / 0.1), hsl(var(--accent) / 0.1));">
                            ${stat.icon}
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <p class="text-4xl md:text-5xl font-bold gradient-text">
                            <span class="count-value" data-index="${index}">0</span>${stat.suffix}
                        </p>
                        <p class="text-sm md:text-base text-muted-foreground font-semibold group-hover:text-foreground transition-colors">
                            ${stat.label}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        // Update counter display
        function updateDisplay() {
            counts.forEach((count, index) => {
                const element = document.querySelector(`[data-index="${index}"]`);
                if (element) {
                    element.textContent = count;
                }
            });
        }

        // Animate counters
        function animateCounters() {
            if (!isVisible) return;

            const duration = 2000;
            const steps = 60;
            const stepDuration = duration / steps;

            stats.forEach((stat, index) => {
                let currentStep = 0;
                const increment = stat.value / steps;

                const timer = setInterval(() => {
                    currentStep++;
                    counts[index] = Math.min(Math.ceil(increment * currentStep), stat.value);
                    updateDisplay();

                    if (currentStep >= steps) {
                        clearInterval(timer);
                    }
                }, stepDuration);
            });
        }

        // Intersection Observer
        const observer = new IntersectionObserver(
            ([entry]) => {
                if (entry.isIntersecting && !isVisible) {
                    isVisible = true;
                    animateCounters();
                }
            },
            { threshold: 0.1 }
        );

        // Initialize
        renderStats();
        const section = document.getElementById('stats-section');
        observer.observe(section);
    </script>
</body>
</html>
